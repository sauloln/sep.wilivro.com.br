{% extends "base.html" %}
{% block content %}
<h1 class="h5 mb-3">Editar Local</h1>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post" class="row g-2">
      <div class="col-md-5">
        <label class="form-label">Nome</label>
        <input class="form-control" name="nome" value="{{ local.nome }}" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Tipo</label>
        <select class="form-select" name="tipo">
          {% for opt,val in [("Escritório","escritorio"),("Cliente","cliente"),("Gráfica","grafica"),("Almoxarifado","almoxarifado"),("Outro","outro")] %}
            <option value="{{ val }}" {% if local.tipo==val %}selected{% endif %}>{{ opt }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Município (IBGE)</label>
        <input class="form-control" name="municipio_id" value="{{ local.municipio_id }}" required>
      </div>
      <div class="col-12">
        <label class="form-label">Endereço</label>
        <input class="form-control" name="endereco" value="{{ local.endereco or '' }}">
      </div>
      <div class="col-12">
        <label class="form-label">Observação</label>
        <textarea class="form-control" name="observacao" rows="3">{{ local.observacao or '' }}</textarea>
      </div>
      <div class="col-12 d-flex justify-content-end gap-2">
        <a class="btn btn-outline-secondary" href="{{ url_for('admin_locais') }}">Voltar</a>
        <button class="btn btn-primary">Salvar</button>
      </div>
    </form>
    <hr>
    <form method="post" action="{{ url_for('admin_local_delete', local_id=local.id) }}" onsubmit="return confirm('Excluir este local?');">
      <button class="btn btn-outline-danger btn-sm">Excluir</button>
    </form>
  </div>
</div>
{% endblock %}
